<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazed Cegs - Área do Joiner</title>
<link rel="icon" type="image/png" href="../imagens/favicon-icone.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2B33;
    --ink-soft: #5C6270;
    --ink-faint: #8A90A0;
    --purple: #6F70A1;
    --purple-dark: #565780;
    --purple-tint: #F1F1F7;
    --coral: #FF5460;
    --coral-dark: #C23440;
    --green: #2A6B4C;
    --green-bg: #E1F0E8;
    --card-bg: #ffffff;
    --line: rgba(43,43,51,0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: #E8EFF6;
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  a { text-decoration: none; color: inherit; }

  /* ───── NAVBAR ───── */
  .nav{
    position:sticky;top:0;z-index:30;
    background:#fff;
    border-bottom:1px solid #E5E7EB;
    display:flex;align-items:center;
    padding:0 32px;height:64px;
    gap:0;
  }
  .nav-logo{
    position:absolute;left:32px;
    display:flex;align-items:center;
    line-height:1;
  }
  .nav-logo img{height:52px;width:auto;display:block;}

  .nav-links{
    margin:0 auto;
    display:flex;align-items:stretch;gap:0;
  }
  .nav-a{
    display:flex;align-items:center;gap:6px;
    padding:0 18px;height:64px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;font-weight:500;color:#4A5070;
    border-bottom:2.5px solid transparent;
    transition:color .15s,border-color .15s;
    white-space:nowrap;position:relative;
  }
  .nav-a svg{width:16px;height:16px;stroke:#4A5070;fill:none;flex-shrink:0;}
  .nav-a:hover{color:#1F2340;}
  .nav-a.active{color:#1F2340;font-weight:600;border-bottom-color:#4B5BAD;}
  .nav-a.active svg{stroke:#1F2340;}
  @media(max-width:1080px){.nav-a span{display:none;}}
  @media(max-width:680px){.nav{padding:0 16px;}.nav-logo{left:16px;}.nav-a{padding:0 10px;}}

  /* ---------- MAIN ---------- */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 32px 90px;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .page-header-text .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: var(--purple);
    background: var(--purple-tint);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .page-header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--ink);
  }

  .page-header p {
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 480px;
    line-height: 1.6;
    margin: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.4px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--coral);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,84,96,0.3);
  }

  .btn-primary:hover {
    background: var(--coral-dark);
    transform: scale(1.045);
    box-shadow: 0 6px 18px rgba(255,84,96,0.38);
  }

  .btn-primary:disabled { opacity: 0.55; cursor: wait; transform: none; box-shadow: none; }

  /* ---------- SEARCH CARD ---------- */
  .search-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
    margin-bottom: 22px;
  }

  .search-row { display: flex; gap: 10px; }

  .at-prefix {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--purple);
    background: var(--purple-tint);
    border: 1px solid rgba(111,112,161,0.25);
    border-radius: 999px;
  }

  #handleInput {
    flex: 1;
    padding: 0 18px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: var(--ink);
    height: 46px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #handleInput:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  #searchBtn {
    padding: 0 26px;
    height: 46px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  #searchBtn:hover {
    background: var(--purple-dark);
    transform: scale(1.045);
    box-shadow: 0 6px 18px rgba(111,112,161,0.38);
  }
  #searchBtn:active { transform: scale(0.97); }
  #searchBtn:disabled { opacity: 0.6; cursor: wait; transform: none; }

  .btn-spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: btnspin 0.7s linear infinite;
    flex-shrink: 0;
  }

  #searchBtn.is-loading .btn-spinner { display: inline-block; }

  @keyframes btnspin { to { transform: rotate(360deg); } }

  .status-msg { margin-top: 14px; font-size: 13px; color: var(--ink-soft); text-align: center; }
  .status-msg.error { color: var(--coral-dark); }

  .filter-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  .filter-row select {
    flex: 1;
    min-width: 140px;
    height: 40px;
    padding: 0 14px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .filter-row select:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  /* ---------- ACTIVE FILTER CHIPS ---------- */
  .chips-row {
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .chips-row.is-open { display: flex; }

  .chips-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-faint);
    margin-right: 2px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--purple-tint);
    color: var(--purple-dark);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 8px 6px 12px;
    border-radius: 999px;
    transition: background 0.15s ease;
  }

  .chip:hover { background: rgba(111,112,161,0.22); }

  .chip button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: rgba(111,112,161,0.22);
    color: var(--purple-dark);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .chip button:hover { background: var(--purple-dark); color: #fff; }

  .chips-clear {
    font-size: 12px;
    font-weight: 600;
    color: var(--coral-dark);
    cursor: pointer;
    background: none;
    border: none;
    padding: 6px 4px;
    transition: opacity 0.15s ease;
  }

  .chips-clear:hover { opacity: 0.7; }

  /* ---------- STAT CARDS ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
  }

  .stat-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stat-icon svg { width: 20px; height: 20px; }

  .stat-card.is-itens .stat-icon { background: var(--purple-tint); color: var(--purple); }
  .stat-card.is-pago .stat-icon { background: var(--green-bg); color: var(--green); }
  .stat-card.is-pendente .stat-icon { background: rgba(255,84,96,0.12); color: var(--coral-dark); }
  .stat-card.is-total .stat-icon { background: rgba(111,112,161,0.18); color: var(--purple-dark); }

  .stat-card-value {
    font-family: 'Oswald', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }

  .stat-card-label {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 1px;
  }

  .stat-card-value-row { display: flex; align-items: center; gap: 6px; }

  .stat-hide-btn {
    background: none;
    border: none;
    padding: 2px;
    cursor: pointer;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, transform 0.15s ease;
  }

  .stat-hide-btn:hover { color: var(--purple); transform: scale(1.08); }
  .stat-hide-btn svg { width: 15px; height: 15px; }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
  }

  /* ---------- VIEW TOGGLE ---------- */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .results-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .results-summary {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .sort-select {
    height: 34px;
    padding: 0 12px;
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .sort-select:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  /* ---------- SELECT ALL / COMPARE ---------- */
  .select-all-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .select-all-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
  }

  .select-all-label input { width: 16px; height: 16px; accent-color: var(--purple); cursor: pointer; }

  .compare-btn {
    display: none;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--purple);
    color: #fff;
    border: none;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .compare-btn.is-visible { display: inline-flex; }
  .compare-btn:hover { background: var(--purple-dark); transform: scale(1.03); }
  .compare-btn svg { width: 13px; height: 13px; }

  .select-actions { display: flex; align-items: center; gap: 8px; }

  .clear-selection-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  .clear-selection-btn.is-visible { display: inline-flex; }
  .clear-selection-btn:hover { background: rgba(255,84,96,0.1); color: var(--coral-dark); transform: scale(1.06); }
  .clear-selection-btn svg { width: 13px; height: 13px; }

  .view-toggle { display: flex; gap: 8px; flex-wrap: wrap; }

  .view-btn {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .view-btn:hover { background: var(--purple-tint); transform: translateY(-1px); }

  .view-btn.active {
    color: #fff;
    background: var(--purple);
    border-color: var(--purple);
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
  }

  .download-btn {
    color: var(--coral-dark);
    background: rgba(255,84,96,0.08);
    border-color: rgba(255,84,96,0.25);
  }

  .download-btn:hover {
    background: rgba(255,84,96,0.15);
    box-shadow: 0 4px 14px rgba(255,84,96,0.18);
  }

  .download-btn:disabled { opacity: 0.6; cursor: wait; transform: none; box-shadow: none; }

  /* ---------- PRODUCT GRID ---------- */
  .results {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }

  @media (max-width: 1280px) {
    .results { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 1024px) {
    .results { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 760px) {
    .results { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .results { grid-template-columns: 1fr; }
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 26px rgba(43,43,51,0.1);
  }

  .product-photo {
    width: 100%;
    aspect-ratio: 1;
    background: var(--purple-tint);
    position: relative;
  }

  .product-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .card-top-row {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    z-index: 3;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    pointer-events: none;
  }

  .card-top-left { display: flex; align-items: center; gap: 5px; pointer-events: none; flex-wrap: wrap; }

  .card-check {
    pointer-events: auto;
    width: 18px;
    height: 18px;
    border-radius: 6px;
    accent-color: var(--purple);
    cursor: pointer;
    background: rgba(255,255,255,0.92);
    box-shadow: 0 1px 4px rgba(43,43,51,0.18);
  }

  .product-stamp {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 4px 9px 4px 7px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
    pointer-events: auto;
    transition: transform 0.15s ease;
  }

  .product-stamp:hover { transform: translateY(-1px); }
  .product-stamp svg { width: 9px; height: 9px; flex-shrink: 0; }

  .product-stamp.status-warehouse { color: #8A6418; background: #FBEFD8; }
  .product-stamp.status-transito { color: #4A4B82; background: rgba(111,112,161,0.18); }
  .product-stamp.status-gom { color: var(--purple-dark); background: rgba(86,87,128,0.16); }
  .product-stamp.status-finalizado { color: var(--green); background: var(--green-bg); }
  .product-stamp.status-pendente { color: var(--coral-dark); background: rgba(255,84,96,0.16); }

  .badge-novo {
    display: inline-flex;
    align-items: center;
    font-family: 'Oswald', sans-serif;
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: #fff;
    background: var(--purple);
    padding: 4px 8px;
    border-radius: 999px;
    pointer-events: auto;
    box-shadow: 0 2px 8px rgba(111,112,161,0.35);
  }

  .card-menu-wrap { position: relative; pointer-events: auto; }

  .card-menu-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.92);
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(43,43,51,0.18);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .card-menu-btn:hover { background: #fff; color: var(--ink); }
  .card-menu-btn svg { width: 14px; height: 14px; }

  .card-menu {
    position: absolute;
    top: 28px;
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(43,43,51,0.14);
    padding: 6px;
    min-width: 160px;
    display: none;
    z-index: 10;
  }

  .card-menu.is-open { display: block; }

  .card-menu button {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    border: none;
    background: none;
    font-size: 12.5px;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .card-menu button:hover { background: var(--purple-tint); color: var(--purple-dark); }
  .card-menu button svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--ink-faint); }
  .card-menu button:hover svg { color: var(--purple-dark); }

  .product-body { padding: 14px 16px 16px; }

  .product-pob {
    font-family: 'Oswald', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 4px;
    line-height: 1.3;
  }

  .product-meta {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .product-meta span { color: var(--ink-soft); font-weight: 600; }

  .product-foot {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
  }

  .product-value {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }

  .product-payment { font-size: 11px; font-weight: 500; }
  .product-payment.pago { color: #2A6B4C; }
  .product-payment.pendente { color: var(--coral-dark); }

  .product-multa {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--coral-dark);
    background: rgba(255,84,96,0.1);
    padding: 3px 7px;
    border-radius: 6px;
    margin-top: 6px;
  }

  /* ---------- CAROUSEL ---------- */
  .product-photo {
    position: relative;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform 0.25s ease;
  }

  .carousel-slide {
    width: 100%;
    height: 100%;
    flex-shrink: 0;
  }

  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .carousel-arrow {
    position: absolute;
    top: 50%;

  function applyTotalVisibility() {
    totalGeral.textContent = totalHidden ? '••••••' : formatMoney(lastTotalGeralVal);
    if (hideTotalBtn) {
      hideTotalBtn.innerHTML = totalHidden ? EYE_OFF_ICON : EYE_ICON;
      hideTotalBtn.setAttribute('aria-label', totalHidden ? 'Mostrar valor total' : 'Ocultar valor total');

  function applyPagoVisibility() {

      hidePagoBtn.innerHTML = pagoHidden ? EYE_OFF_ICON : EYE_ICON;

    document.getElementById('viewTableBtn')

  if (hideTotalBtn) {

      pagoHidden = !pagoHidden;
      localStorage.setItem('dazedPagoHidden', pagoHidden ? '1' : '0');
      applyPagoVisibility();
    });
  }

  function statusClass(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('finalizado') || s.includes('enviado joiner')) return 'status-finalizado';
    if (s.includes('gom')) return 'status-gom';
    if (s.includes('warehouse') || s.includes('seller')) return 'status-warehouse';
    if (s.includes('enviado') || s.includes('alfandega') || s.includes('alfândega') || s.includes('transito')) return 'status-transito';
    if (s.includes('comprado') || s.includes('aguardando')) return 'status-pendente';
    return 'status-transito';
  }

  const STATUS_ICONS = {
    'status-warehouse': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/></svg>',
    'status-transito': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h13M13 6l6 6-6 6"/></svg>',
    'status-gom': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 21V8l8-5 8 5v13"/><path d="M9 21v-6h6v6"/></svg>',
    'status-finalizado': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>',
    'status-pendente': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>'
  };

  function statusIcon(cls) {
    return STATUS_ICONS[cls] || '';
  }

  function renderSkeleton() {
    resultsEl.className = 'results view-grid';
    resultsEl.innerHTML = '';
    filterRow.style.display = 'none';
    chipsRow.classList.remove('is-open');
    chipsRow.innerHTML = '';
    toolbar.style.display = 'none';
    statGrid.style.display = 'none';
    downloadPdfBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    selectAllRow.style.display = 'none';
    for (let i = 0; i < 8; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      resultsEl.appendChild(sk);
    }
  }

  function renderError(msg) {
    resultsEl.className = 'results view-grid';
    resultsEl.innerHTML = '';
    filterRow.style.display = 'none';
    chipsRow.classList.remove('is-open');
    chipsRow.innerHTML = '';
    toolbar.style.display = 'none';
    statGrid.style.display = 'none';
    downloadPdfBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    selectAllRow.style.display = 'none';
    statusMsg.textContent = msg;
    statusMsg.classList.add('error');
  }

  function escapeAttr(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function populateFilters(pedidos) {
    const cegs = [...new Set(pedidos.map(p => (p.ceg || '').trim()).filter(Boolean))].sort();
    cegFilter.innerHTML = '<option value="">Todas as CEGs</option>' +
      cegs.map(c => `<option value="${escapeAttr(c)}">${c}</option>`).join('');
    updateDependentFilters();
  }

  function cegShowsPobFilter(cegNome) {
    if (!cegNome) return true;
    const cfg = cegsConfig.find(c => c.nome === cegNome);
    return cfg ? !!cfg.showPobFilter : true;
  }

  function updateDependentFilters() {
    const cegVal = cegFilter.value;
    const scoped = cegVal ? allPedidos.filter(p => (p.ceg || '').trim() === cegVal) : allPedidos;

    const statuses = [...new Set(scoped.map(p => (p.status || '').trim()).filter(Boolean))].sort();
    statusFilter.innerHTML = '<option value="">Todos os status</option>' +
      statuses.map(s => `<option value="${escapeAttr(s)}">${s.toUpperCase()}</option>`).join('');

    const membros = [...new Set(scoped.map(p => (p.membro || '').trim()).filter(Boolean))].sort();
    membroFilter.innerHTML = '<option value="">Todos os membros</option>' +
      membros.map(m => `<option value="${escapeAttr(m)}">${m.toUpperCase()}</option>`).join('');

    const showPob = cegVal
      ? cegShowsPobFilter(cegVal)
      : cegsConfig.some(c => c.showPobFilter);

    if (showPob) {
      const pobs = [...new Set(scoped.map(p => (p.pob || '').trim()).filter(Boolean))].sort();
      pobFilter.innerHTML = '<option value="">Todos os itens</option>' +
        pobs.map(p => `<option value="${escapeAttr(p)}">${p}</option>`).join('');
      pobFilter.style.display = '';
    } else {
      pobFilter.value = '';
      pobFilter.style.display = 'none';
    }
  }

  function sortPedidos(arr) {
    const sorted = arr.slice();
    const sortVal = sortSelect ? sortSelect.value : 'recentes';
    switch (sortVal) {
      case 'nome-az':
        sorted.sort((a, b) => (a.pob || '').localeCompare(b.pob || ''));
        break;
      case 'nome-za':
        sorted.sort((a, b) => (b.pob || '').localeCompare(a.pob || ''));
        break;
      case 'menor-valor':
        sorted.sort((a, b) => (typeof a.valor === 'number' ? a.valor : 0) - (typeof b.valor === 'number' ? b.valor : 0));
        break;
      case 'maior-valor':
        sorted.sort((a, b) => (typeof b.valor === 'number' ? b.valor : 0) - (typeof a.valor === 'number' ? a.valor : 0));
        break;
      case 'antigos':
        break; // ordem original da planilha = mais antigos primeiro
      case 'recentes':
      default:
        sorted.reverse();
        break; // linhas mais recentes da planilha aparecem primeiro
    }
    return sorted;
  }

  function activeFilterDefs() {
    return [
      { key: 'ceg', label: cegFilter.value, clear: () => { cegFilter.value = ''; updateDependentFilters(); } },
      { key: 'status', label: statusFilter.value, clear: () => { statusFilter.value = ''; } },
      { key: 'membro', label: membroFilter.value, clear: () => { membroFilter.value = ''; } },
      { key: 'pob', label: cegShowsPobFilter(cegFilter.value) ? pobFilter.value : '', clear: () => { pobFilter.value = ''; } }
    ].filter(f => f.label);
  }

  function renderChips() {
    const active = activeFilterDefs();
    if (active.length === 0) {
      chipsRow.classList.remove('is-open');
      chipsRow.innerHTML = '';
      return;
    }
    chipsRow.classList.add('is-open');
    const countLabel = active.length === 1 ? '1 filtro ativo' : `${active.length} filtros ativos`;
    chipsRow.innerHTML = `<span class="chips-count">${countLabel}</span>` +
      active.map((f, i) => {
        const shown = (f.key === 'status' || f.key === 'membro') ? f.label.toUpperCase() : f.label;
        return `<span class="chip" data-chip="${i}">${escapeAttr(shown)}<button type="button" aria-label="Remover filtro">&times;</button></span>`;
      }).join('') +
      `<button type="button" class="chips-clear" id="chipsClearBtn">Limpar tudo</button>`;

    active.forEach((f, i) => {
      const chipEl = chipsRow.querySelector(`.chip[data-chip="${i}"] button`);
      if (chipEl) chipEl.addEventListener('click', () => { f.clear(); applyFilters(); });
    });
    const clearBtn = document.getElementById('chipsClearBtn');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      cegFilter.value = ''; statusFilter.value = ''; membroFilter.value = ''; pobFilter.value = '';
      updateDependentFilters();
      applyFilters();
    });
  }

  function applyFilters() {
    const cegVal = cegFilter.value;
    const statusVal = statusFilter.value;
    const membroVal = membroFilter.value;
    const pobVal = cegShowsPobFilter(cegVal) ? pobFilter.value : '';
    const filtered = allPedidos.filter(p =>
      (!cegVal || (p.ceg || '').trim() === cegVal) &&
      (!statusVal || (p.status || '').trim() === statusVal) &&
      (!membroVal || (p.membro || '').trim() === membroVal) &&
      (!pobVal || (p.pob || '').trim() === pobVal)
    );
    currentPage = 1;
    renderChips();
    renderCards(sortPedidos(filtered), allPedidos.length);
  }

  function updateStatGrid(pedidos) {
    if (!pedidos || pedidos.length === 0) {
      statGrid.style.display = 'none';
      return;
    }

    let totalPagoVal = 0;
    let totalPendenteVal = 0;

    pedidos.forEach(p => {
      const valor = typeof p.valor === 'number' ? p.valor : 0;
      if (p.pagamento === 'Pago') {
        totalPagoVal += valor;
      } else {
        totalPendenteVal += valor + (p.multa || 0);
      }
    });

    const totalGeralVal = totalPagoVal + totalPendenteVal;

    totalItensCount.textContent = pedidos.length;
    lastTotalPagoVal = totalPagoVal;
    applyPagoVisibility();
    totalPendente.textContent = formatMoney(totalPendenteVal);
    lastTotalGeralVal = totalGeralVal;
    applyTotalVisibility();
    statGrid.style.display = 'grid';
  }

  function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / PAGE_SIZE);
    paginationEl.innerHTML = '';

    if (totalPages <= 1) {
      paginationEl.style.display = 'none';
      return;
    }
    paginationEl.style.display = 'flex';

    function makeBtn(label, page, opts = {}) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'page-btn' + (opts.active ? ' active' : '');
      b.textContent = label;
      b.disabled = !!opts.disabled;
      b.addEventListener('click', () => {
        currentPage = page;
        renderCards(lastRendered, lastTotal, true);
        window.scrollTo({ top: toolbar.offsetTop - 90, behavior: 'smooth' });
      });
      return b;
    }

    paginationEl.appendChild(makeBtn('«', currentPage - 1, { disabled: currentPage === 1 }));

    const pages = [];
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) pages.push(i);
    }
    let prev = 0;
    pages.forEach(p => {
      if (prev && p - prev > 1) {
        const dots = document.createElement('span');
        dots.className = 'page-ellipsis';
        dots.textContent = '…';
        paginationEl.appendChild(dots);
      }
      paginationEl.appendChild(makeBtn(String(p), p, { active: p === currentPage }));
      prev = p;
    });

    paginationEl.appendChild(makeBtn('»', currentPage + 1, { disabled: currentPage === totalPages }));
  }

  function renderCards(pedidos, totalOriginal, skipReset) {
    lastRendered = pedidos;
    lastTotal = totalOriginal;
    if (!skipReset) currentPage = 1;

    updateStatGrid(pedidos);

    if (!pedidos || pedidos.length === 0) {
      resultsEl.className = 'results view-grid';
      resultsEl.innerHTML = `<div class="empty-state">Nenhum item encontrado com esse filtro.</div>`;
      toolbar.style.display = 'none';
      paginationEl.style.display = 'none';
      downloadPdfBtn.style.display = 'none';
      selectAllRow.style.display = 'none';
      return;
    }

    toolbar.style.display = 'flex';
    downloadPdfBtn.style.display = 'inline-flex';

    const filtered = pedidos.length !== totalOriginal;
    resultsSummary.textContent = pedidos.length + (pedidos.length === 1 ? ' item' : ' itens') + (filtered ? ` de ${totalOriginal}` : ' encontrados');

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = pedidos.slice(start, start + PAGE_SIZE);

    if (currentView === 'grid') renderGrid(pageItems);
    else if (currentView === 'table') renderTable(pageItems);
    else renderList(pageItems);

    renderPagination(pedidos.length);
  }

  function thumbHtml(p) {
    const slug = p.pobSlug || '';
    if (!slug) return '';
    const folder = p.imgFolder ? IMG_FOLDER + p.imgFolder + '/' : IMG_FOLDER;
    const imgSrc = folder + slug + '.png';
    return `<img src="${imgSrc}" alt="${p.pob || ''}" data-slug="${slug}" data-folder="${p.imgFolder || ''}" data-ext-idx="0" onerror="window.__tryNextExt(this)" />`;
  }

  let carouselSeq = 0;

  function carouselHtml(p) {
    const slug = p.pobSlug || '';
    if (!slug) return '<div class="order-thumb-empty"></div>';
    const folder = p.imgFolder ? IMG_FOLDER + p.imgFolder + '/' : IMG_FOLDER;
    const cid = 'car' + (carouselSeq++);
    return `
      <div class="carousel-track" id="${cid}" data-folder="${folder}" data-slug="${slug}" data-count="1">
        <div class="carousel-slide"><img src="${folder}${slug}-1.png" alt="${p.pob || ''}" onerror="window.__carouselImgFallback(this,'${cid}')" /></div>
      </div>
      <button type="button" class="carousel-arrow prev" style="display:none;" onclick="window.__carouselNav('${cid}',-1)" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button type="button" class="carousel-arrow next" style="display:none;" onclick="window.__carouselNav('${cid}',1)" aria-label="Próxima">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="carousel-dots" id="${cid}-dots" style="display:none;"></div>
    `;
  }

  function enhanceCarousel(cid, folder, slug) {
    const track = document.getElementById(cid);
    if (!track) return;
    const wrap = track.parentElement;
    const found = [];
    let pending = 4;
    function done() {
      pending--;
      if (pending > 0) return;
      if (found.length === 0) return;
      found.sort((a, b) => a.n - b.n);
      track.innerHTML = `<div class="carousel-slide"><img src="${folder}${slug}-1.png" alt="" /></div>` +
        found.map(f => `<div class="carousel-slide"><img src="${f.src}" alt="" /></div>`).join('');
      track.dataset.count = String(1 + found.length);
      track.dataset.index = '0';
      const prevBtn = wrap.querySelector('.carousel-arrow.prev');
      const nextBtn = wrap.querySelector('.carousel-arrow.next');
      const dotsEl = document.getElementById(cid + '-dots');
      if (prevBtn) prevBtn.style.display = 'flex';
      if (nextBtn) nextBtn.style.display = 'flex';
      if (dotsEl) {
        dotsEl.style.display = 'flex';
        const total = 1 + found.length;
        dotsEl.innerHTML = Array.from({ length: total }).map((_, i) =>
          `<button type="button" class="carousel-dot${i === 0 ? ' active' : ''}" onclick="window.__carouselGoTo('${cid}',${i})" aria-label="Foto ${i + 1}"></button>`
        ).join('');
      }
    }
    for (let n = 2; n <= 5; n++) {
      const testImg = new Image();
      const src = `${folder}${slug}-${n}.png`;
      testImg.onload = () => { found.push({ n, src }); done(); };
      testImg.onerror = () => { done(); };
      testImg.src = src;
    }
  }

  window.__carouselImgFallback = function(imgEl, cid) {
    const track = document.getElementById(cid);
    if (!track) return;
    const folder = track.dataset.folder;
    const slug = track.dataset.slug;
    if (!imgEl.dataset.fallenBack) {
      imgEl.dataset.fallenBack = '1';
      imgEl.onerror = function() { window.__carouselExtFallback(imgEl); };
      imgEl.src = `${folder}${slug}.png`;
    }
  };

  window.__carouselExtFallback = function(imgEl) {
    const exts = ['jpg', 'jpeg'];
    let idx = parseInt(imgEl.getAttribute('data-ext-idx2') || '0', 10);
    if (idx < exts.length) {
      const base = imgEl.src.replace(/\.(png|jpg|jpeg)$/i, '');
      imgEl.setAttribute('data-ext-idx2', String(idx + 1));
      imgEl.onerror = function() { window.__carouselExtFallback(imgEl); };
      imgEl.src = base + '.' + exts[idx];
    } else {
      const wrap = imgEl.closest('.product-photo');
      if (wrap) wrap.style.background = 'var(--purple-tint)';
      imgEl.remove();
    }
  };

  window.__carouselNav = function(cid, dir) {
    const track = document.getElementById(cid);
    if (!track) return;
    const count = parseInt(track.dataset.count || '1', 10);
    if (count <= 1) return;
    let idx = parseInt(track.dataset.index || '0', 10);
    idx = (idx + dir + count) % count;
    window.__carouselGoTo(cid, idx);
  };

  window.__carouselGoTo = function(cid, idx) {
    const track = document.getElementById(cid);
    if (!track) return;
    track.dataset.index = String(idx);
    track.style.transform = `translateX(-${idx * 100}%)`;
    const dotsEl = document.getElementById(cid + '-dots');
    if (dotsEl) {
      dotsEl.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    }
  };

          <td><div class="table-thumb">${thumbHtml(p)}</div></td>
          <td>${p.pob || 'Item'}</td>
          <td>${(p.membro || '-').toUpperCase()}</td>
          <td><span class="table-stamp ${cls}">${statusIcon(cls)}${(p.status || '-').toUpperCase()}</span> ${novoHtml}</td>
          <td>${formatValor(p)}</td>
          <td>${p.prazo || '-'}</td>
          <td>${p.pagamento || '-'}</td>
        </tr>`;
    }).join('');
    resultsEl.innerHTML = `
      <table class="order-table">
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Item</th>
            <th>Membro</th>
            <th>Status</th>
            <th>Valor</th>
            <th>Prazo</th>
            <th>Pagamento</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
    wireCardInteractions(pedidos);
  }

  function setView(view) {
    if (view !== currentView) {
      selectedUids = new Set();
    }
    currentView = view;
    viewButtons.forEach(b => b.classList.toggle('active', b.dataset.view === view));
    renderCards(lastRendered, lastTotal, true);
  }

  viewButtons.forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));

  function renderResults(data) {
    allPedidos = data.pedidos || [];
    allPedidos.forEach((p, i) => { p.__uid = i; });
    cegsConfig = data.cegs || [];
    currentPage = 1;
    selectedUids = new Set();
    if (allPedidos.length === 0) {
      resultsEl.className = 'results view-grid';
      resultsEl.innerHTML = `
        <div class="empty-state">
          Nenhum item encontrado pra <strong>@${data.query}</strong>.<br>
          Confira se digitou certo ou fale com a gente.
        </div>`;
      cegFilter.innerHTML = '<option value="">Todas as CEGs</option>';
      statusFilter.innerHTML = '<option value="">Todos os status</option>';
      membroFilter.innerHTML = '<option value="">Todos os membros</option>';
      pobFilter.innerHTML = '<option value="">Todos os itens</option>';
      filterRow.style.display = 'none';
      chipsRow.classList.remove('is-open');
      chipsRow.innerHTML = '';
      toolbar.style.display = 'none';
      statGrid.style.display = 'none';
      downloadPdfBtn.style.display = 'none';
      paginationEl.style.display = 'none';
      selectAllRow.style.display = 'none';
      return;
    }
    populateFilters(allPedidos);
    cegFilter.value = '';
    statusFilter.value = '';
    membroFilter.value = '';
    pobFilter.value = '';
    filterRow.style.display = 'flex';
    renderChips();
    if (sortSelect) sortSelect.value = 'recentes';
    renderCards(sortPedidos(allPedidos), allPedidos.length);
  }

  window.__tryNextExt = function(imgEl) {
    const exts = ['png', 'jpg', 'jpeg'];
    let idx = parseInt(imgEl.getAttribute('data-ext-idx') || '0', 10) + 1;
    const slug = imgEl.getAttribute('data-slug');
    const folderAttr = imgEl.getAttribute('data-folder') || '';
    const folder = folderAttr ? IMG_FOLDER + folderAttr + '/' : IMG_FOLDER;
    if (idx < exts.length) {
      imgEl.setAttribute('data-ext-idx', String(idx));
      imgEl.src = folder + slug + '.' + exts[idx];
    } else {
      const parent = imgEl.parentElement;
      imgEl.remove();
      if (parent) parent.style.background = 'rgba(111,112,161,0.08)';
    }
  };

  function downloadPdf() {
    if (!allPedidos || allPedidos.length === 0) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('Dazed Cegs - Itens de @' + currentHandle, 14, 18);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Gerado em ' + new Date().toLocaleDateString('pt-BR'), 14, 25);

    const rows = allPedidos.map(p => [
      p.ceg || '-',
      p.pob || '-',
      p.membro || '-',
      p.status || '-',
      formatValor(p),
      p.prazo || '-',
      p.pagamento || '-'
    ]);

    doc.autoTable({
      startY: 32,
      head: [['CEG', 'Item', 'Membro', 'Status', 'Valor', 'Prazo', 'Pagamento']],
      body: rows,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [111, 112, 161] },
      margin: { left: 14, right: 14 }
    });

    doc.save('dazed-cegs-' + currentHandle + '.pdf');
  }

  downloadPdfBtn.addEventListener('click', downloadPdf);

  async function search() {
    const handle = input.value.trim().replace(/^@/, '');
    if (!handle) {
      statusMsg.textContent = 'Digite seu user pra buscar.';
      statusMsg.classList.add('error');
      return;
    }

    currentHandle = handle;
    statusMsg.textContent = '';
    statusMsg.classList.remove('error');
    btn.disabled = true;
    btn.classList.add('is-loading');
    renderSkeleton();

    try {
      const res = await fetch(`${API_URL}?at=${encodeURIComponent(handle)}`);
      if (!res.ok) throw new Error('Falha na consulta');
      const data = await res.json();
      if (data.error) {
        renderError(data.error);
      } else {
        renderResults(data);
      }
    } catch (err) {
      renderError('Não foi possível consultar agora. Tenta de novo em instantes.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('is-loading');
    }
  }

  // ---------- COMPARE / SELEÇÃO ----------
  function closeAllMenus(exceptUid) {
    resultsEl.querySelectorAll('.card-menu.is-open').forEach(m => {
      if (!exceptUid || m.dataset.menu !== String(exceptUid)) m.classList.remove('is-open');
    });
  }

  function updateCompareBtnUI() {
    const n = selectedUids.size;
    if (currentView === 'table') {
      compareBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Exportar PDF (<span id="compareCount">${n}</span>)
      `;
      compareBtn.classList.toggle('is-visible', n >= 1);
    } else {
      compareBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h4M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M9 3v18M15 3v18"/></svg>
        Comparar (<span id="compareCount">${n}</span>)
      `;
      compareBtn.classList.toggle('is-visible', n >= 2);
    }
    clearSelectionBtn.classList.toggle('is-visible', n > 0);
  }

  function updateCompareBar(visibleUids) {
    updateCompareBtnUI();
    if (visibleUids && visibleUids.length) {
      const allChecked = visibleUids.every(u => selectedUids.has(u));
      selectAllCheck.checked = allChecked;
      selectAllCheck.indeterminate = !allChecked && visibleUids.some(u => selectedUids.has(u));
    }
  }

  function toggleUid(uid, checked) {
    if (checked) {
      if (currentView !== 'table' && selectedUids.size >= MAX_COMPARE) {
        checked = false;
        const cb = resultsEl.querySelector(`.card-check[data-uid="${uid}"]`);
        if (cb) cb.checked = false;
        statusMsg.textContent = `Você pode comparar até ${MAX_COMPARE} itens por vez.`;
        statusMsg.classList.remove('error');
        setTimeout(() => { if (statusMsg.textContent.indexOf('comparar até') !== -1) statusMsg.textContent = ''; }, 2600);
        return;
      }
      selectedUids.add(uid);
    } else {
      selectedUids.delete(uid);
    }
    const visibleUids = lastRendered.map(p => p.__uid);
    updateCompareBar(visibleUids);
  }

  function wireCardInteractions(pedidos) {
    const visibleUids = pedidos.map(p => p.__uid);
    selectAllRow.style.display = pedidos.length ? 'flex' : 'none';
    if (currentView === 'table') {
      selectAllLabel.style.display = 'flex';
      selectAllRow.style.justifyContent = 'space-between';
    } else {
      selectAllLabel.style.display = 'none';
      selectAllRow.style.justifyContent = 'flex-end';
    }
    updateCompareBar(visibleUids);

    resultsEl.querySelectorAll('.card-check').forEach(cb => {
      cb.addEventListener('click', e => e.stopPropagation());
      cb.addEventListener('change', () => {
        toggleUid(parseInt(cb.dataset.uid, 10), cb.checked);
      });
    });

    resultsEl.querySelectorAll('[data-menu-toggle]').forEach(btnEl => {
      btnEl.addEventListener('click', e => {
        e.stopPropagation();
        const uid = btnEl.dataset.menuToggle;
        const menu = resultsEl.querySelector(`.card-menu[data-menu="${uid}"]`);
        const isOpen = menu.classList.contains('is-open');
        closeAllMenus();
        if (!isOpen) menu.classList.add('is-open');
      });
    });

    resultsEl.querySelectorAll('.card-menu button[data-action]').forEach(actionBtn => {
      actionBtn.addEventListener('click', e => {
        e.stopPropagation();
        const uid = parseInt(actionBtn.dataset.uid, 10);
        const pedido = allPedidos.find(p => p.__uid === uid);
        closeAllMenus();
        if (!pedido) return;
        const action = actionBtn.dataset.action;
        if (action === 'download') downloadFoto(pedido);
        else if (action === 'whatsapp') compartilharWhatsapp(pedido);
        else if (action === 'copylink') copiarLink(pedido);
      });
    });
  }

  document.addEventListener('click', () => closeAllMenus());

  selectAllCheck.addEventListener('change', () => {
    const visibleUids = lastRendered.map(p => p.__uid);
    const hadSelection = selectedUids.size > 0;
    if (!hadSelection) {
      if (currentView === 'table') {
        visibleUids.forEach(u => selectedUids.add(u));
      } else {
        let count = 0;
        visibleUids.forEach(u => {
          if (count < MAX_COMPARE) { selectedUids.add(u); count++; }
        });
      }
    } else {
      selectedUids.clear();
    }
    renderCards(lastRendered, lastTotal, true);
  });

  clearSelectionBtn.addEventListener('click', () => {
    selectedUids.clear();
    renderCards(lastRendered, lastTotal, true);
  });

  function itemImgSrc(p) {
    const slug = p.pobSlug || '';
    if (!slug) return '';
    const folder = p.imgFolder ? IMG_FOLDER + p.imgFolder + '/' : IMG_FOLDER;
    return folder + slug + '.png';
  }

  function downloadFoto(p) {
    const src = itemImgSrc(p);
    if (!src) return;
    const a = document.createElement('a');
    a.href = src;
    a.download = (p.pobSlug || 'item') + '.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function buildShareText(p) {
    return `${p.pob || 'Item'} — ${(p.membro || '-').toUpperCase()} (${p.ceg || ''}) — ${formatValor(p)}`;
  }

  function absoluteUrl(path) {
    if (!path) return window.location.href;
    try { return new URL(path, window.location.href).href; } catch (err) { return path; }
  }

  function compartilharWhatsapp(p) {
    const texto = buildShareText(p) + ' ' + absoluteUrl(itemImgSrc(p));
    const url = 'https://wa.me/?text=' + encodeURIComponent(texto);
    window.open(url, '_blank');
  }

  async function copiarLink(p) {
    const link = absoluteUrl(itemImgSrc(p));
    if (navigator.clipboard) {
      try {
        await navigator.clipboard.writeText(link);
        statusMsg.textContent = 'Link copiado!';
        statusMsg.classList.remove('error');
        setTimeout(() => { if (statusMsg.textContent === 'Link copiado!') statusMsg.textContent = ''; }, 2200);
      } catch (err) { /* ignora */ }
    }
  }

  function exportSelectedPdf() {
    const items = allPedidos.filter(p => selectedUids.has(p.__uid));
    if (!items.length) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('Dazed Cegs - Itens selecionados de @' + currentHandle, 14, 18);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Gerado em ' + new Date().toLocaleDateString('pt-BR'), 14, 25);

    const rows = items.map(p => [
      p.ceg || '-',
      p.pob || '-',
      p.membro || '-',
      p.status || '-',
      formatValor(p),
      p.prazo || '-',
      p.pagamento || '-'
    ]);

    doc.autoTable({
      startY: 32,
      head: [['CEG', 'Item', 'Membro', 'Status', 'Valor', 'Prazo', 'Pagamento']],
      body: rows,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [111, 112, 161] },
      margin: { left: 14, right: 14 }
    });

    doc.save('dazed-cegs-selecionados-' + currentHandle + '.pdf');
  }

  compareBtn.addEventListener('click', () => {
    if (currentView === 'table') {
      exportSelectedPdf();
      return;
    }
    const items = allPedidos.filter(p => selectedUids.has(p.__uid));
    compareGrid.innerHTML = items.map(p => `
      <div class="compare-item">
        <img src="${itemImgSrc(p)}" alt="${p.pob || ''}" onerror="this.style.opacity=0;">
        <h4>${p.pob || 'Item'}</h4>
        <div class="cr"><span>Membro</span><span>${(p.membro || '-').toUpperCase()}</span></div>
        <div class="cr"><span>CEG</span><span>${p.ceg || '-'}</span></div>
        <div class="cr"><span>Valor</span><span>${formatValor(p)}</span></div>
        <div class="cr"><span>Status</span><span>${(p.status || '-').toUpperCase()}</span></div>
      </div>
    `).join('');
    compareOverlay.classList.add('is-open');
  });

  compareCloseBtn.addEventListener('click', () => compareOverlay.classList.remove('is-open'));
  compareOverlay.addEventListener('click', e => {
    if (e.target === compareOverlay) compareOverlay.classList.remove('is-open');
  });

  btn.addEventListener('click', search);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
  statusFilter.addEventListener('change', () => { applyFilters(); });
  membroFilter.addEventListener('change', () => { applyFilters(); });
  pobFilter.addEventListener('change', () => { applyFilters(); });
  sortSelect.addEventListener('change', () => { applyFilters(); });
  cegFilter.addEventListener('change', () => {
    updateDependentFilters();
    applyFilters();
  });
</script>

</body>
</html>
