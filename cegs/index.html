<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazed Cegs - Área do Joiner</title>
<link rel="icon" type="image/png" href="../imagens/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2B33;
    --ink-soft: #5C6270;
    --ink-faint: #8A90A0;
    --purple: #6F70A1;
    --purple-dark: #565780;
    --purple-tint: #F1F1F7;
    --coral: #FF5460;
    --coral-dark: #C23440;
    --green: #2A6B4C;
    --green-bg: #E1F0E8;
    --card-bg: #ffffff;
    --line: rgba(43,43,51,0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: #FCFBF9;
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  a { text-decoration: none; color: inherit; }

  /* ---------- TOP NAV ---------- */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 44px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topnav-logo { display: flex; align-items: center; gap: 10px; }
  .topnav-logo img { height: 38px; width: 38px; border-radius: 9px; display: block; }
  .topnav-logo span {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--ink);
  }

  .topnav-links { display: flex; align-items: center; gap: 6px; }

  .topnav-link {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border-radius: 9px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .topnav-link svg { width: 16px; height: 16px; opacity: 0.75; }
  .topnav-link:hover { background: var(--purple-tint); color: var(--ink); }
  .topnav-link.active { color: var(--purple-dark); font-weight: 600; background: var(--purple-tint); }
  .topnav-link.active svg { opacity: 1; }

  .topnav-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--purple);
    flex-shrink: 0;
  }

  .topnav-avatar svg { width: 18px; height: 18px; }

  /* ---------- MAIN ---------- */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 32px 90px;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .page-header-text .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: var(--purple);
    background: var(--purple-tint);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .page-header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--ink);
  }

  .page-header p {
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 480px;
    line-height: 1.6;
    margin: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.4px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--coral);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,84,96,0.3);
  }

  .btn-primary:hover {
    background: var(--coral-dark);
    transform: scale(1.045);
    box-shadow: 0 6px 18px rgba(255,84,96,0.38);
  }

  .btn-primary:disabled { opacity: 0.55; cursor: wait; transform: none; box-shadow: none; }

  /* ---------- SEARCH CARD ---------- */
  .search-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
    margin-bottom: 22px;
  }

  .search-row { display: flex; gap: 10px; }

  .at-prefix {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--purple);
    background: var(--purple-tint);
    border: 1px solid rgba(111,112,161,0.25);
    border-radius: 999px;
  }

  #handleInput {
    flex: 1;
    padding: 0 18px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: var(--ink);
    height: 46px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #handleInput:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  #searchBtn {
    padding: 0 26px;
    height: 46px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  #searchBtn:hover {
    background: var(--purple-dark);
    transform: scale(1.045);
    box-shadow: 0 6px 18px rgba(111,112,161,0.38);
  }
  #searchBtn:active { transform: scale(0.97); }
  #searchBtn:disabled { opacity: 0.6; cursor: wait; transform: none; }

  .status-msg { margin-top: 14px; font-size: 13px; color: var(--ink-soft); text-align: center; }
  .status-msg.error { color: var(--coral-dark); }

  .filter-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  .filter-row select {
    flex: 1;
    min-width: 140px;
    height: 40px;
    padding: 0 14px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .filter-row select:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  /* ---------- STAT CARDS ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
  }

  .stat-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stat-icon svg { width: 20px; height: 20px; }

  .stat-card.is-itens .stat-icon { background: var(--purple-tint); color: var(--purple); }
  .stat-card.is-pago .stat-icon { background: var(--green-bg); color: var(--green); }
  .stat-card.is-pendente .stat-icon { background: rgba(255,84,96,0.12); color: var(--coral-dark); }
  .stat-card.is-total .stat-icon { background: rgba(111,112,161,0.18); color: var(--purple-dark); }

  .stat-card-value {
    font-family: 'Oswald', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }

  .stat-card-label {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 1px;
  }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
  }

  /* ---------- VIEW TOGGLE ---------- */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .results-summary {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .view-toggle { display: flex; gap: 8px; flex-wrap: wrap; }

  .view-btn {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .view-btn:hover { background: var(--purple-tint); transform: translateY(-1px); }

  .view-btn.active {
    color: #fff;
    background: var(--purple);
    border-color: var(--purple);
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
  }

  .download-btn {
    color: var(--coral-dark);
    background: rgba(255,84,96,0.08);
    border-color: rgba(255,84,96,0.25);
  }

  .download-btn:hover {
    background: rgba(255,84,96,0.15);
    box-shadow: 0 4px 14px rgba(255,84,96,0.18);
  }

  .download-btn:disabled { opacity: 0.6; cursor: wait; transform: none; box-shadow: none; }

  /* ---------- PRODUCT GRID ---------- */
  .results {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  @media (max-width: 1024px) {
    .results { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 760px) {
    .results { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .results { grid-template-columns: 1fr; }
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 26px rgba(43,43,51,0.1);
  }

  .product-photo {
    width: 100%;
    aspect-ratio: 1;
    background: var(--purple-tint);
    position: relative;
  }

  .product-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .product-stamp {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(4px);
  }

  .product-stamp.status-warehouse { color: #8A6418; }
  .product-stamp.status-transito { color: #4A4B82; }
  .product-stamp.status-finalizado { color: #2A6B4C; }
  .product-stamp.status-pendente { color: var(--coral-dark); }

  .product-body { padding: 14px 16px 16px; }

  .product-pob {
    font-family: 'Oswald', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 4px;
    line-height: 1.3;
  }

  .product-meta {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .product-meta span { color: var(--ink-soft); font-weight: 600; }

  .product-foot {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
  }

  .product-value {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }

  .product-payment { font-size: 11px; font-weight: 500; }
  .product-payment.pago { color: #2A6B4C; }
  .product-payment.pendente { color: var(--coral-dark); }

  .product-multa {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--coral-dark);
    background: rgba(255,84,96,0.1);
    padding: 3px 7px;
    border-radius: 6px;
    margin-top: 6px;
  }

  /* ---------- TABLE VIEW ---------- */
  .results.view-table {
    display: block;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow-x: auto;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
  }

  table.order-table { width: 100%; border-collapse: collapse; font-size: 12px; }

  table.order-table th {
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }

  table.order-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
    white-space: nowrap;
  }

  table.order-table tr:last-child td { border-bottom: none; }

  .table-thumb { width: 28px; height: 28px; border-radius: 6px; overflow: hidden; background: var(--purple-tint); }
  .table-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .table-stamp {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 5px;
  }

  .status-warehouse { color: #8A6418; background: rgba(201,150,47,0.16); }
  .status-transito { color: #4A4B82; background: rgba(111,112,161,0.16); }
  .status-finalizado { color: #2A6B4C; background: rgba(62,143,104,0.16); }
  .status-pendente { color: var(--coral-dark); background: rgba(255,84,96,0.14); }

  /* ---------- LIST VIEW (compact) ---------- */
  .results.view-list { display: flex; flex-direction: column; gap: 12px; }

  .order-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-left: 4px solid var(--purple);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(43,43,51,0.09); }

  .order-card.status-warehouse { border-left-color: #C9962F; }
  .order-card.status-transito { border-left-color: var(--purple); }
  .order-card.status-finalizado { border-left-color: #3E8F68; }
  .order-card.status-pendente { border-left-color: var(--coral-dark); }

  .order-thumb { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--purple-tint); }
  .order-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .order-main { flex: 1; min-width: 160px; }

  .order-pob {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 4px;
    text-transform: uppercase;
  }

  .order-meta { font-size: 13px; color: var(--ink-soft); line-height: 1.4; }
  .order-meta span { color: var(--ink); font-weight: 600; }
  .order-side { text-align: right; min-width: 100px; }

  .stamp {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 5px;
    margin-bottom: 4px;
  }

  .order-value { font-size: 15px; font-weight: 600; color: var(--ink); font-family: 'Oswald', sans-serif; }
  .order-payment { font-size: 11px; margin-top: 2px; font-weight: 500; }
  .order-payment.pago { color: #2A6B4C; }
  .order-payment.pendente { color: var(--coral-dark); }

  /* ---------- PAGINATION ---------- */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .page-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 8px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .page-btn:hover:not(:disabled) { background: var(--purple-tint); color: var(--ink); }

  .page-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }

  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .page-ellipsis {
    color: var(--ink-faint);
    font-size: 13px;
    padding: 0 4px;
  }

  /* ---------- EMPTY / SKELETON ---------- */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.6;
    grid-column: 1 / -1;
  }

  .skeleton {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    height: 220px;
    position: relative;
    overflow: hidden;
  }

  .skeleton::after {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(111,112,161,0.08), transparent);
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer { 100% { left: 100%; } }

  @media (max-width: 1024px) { .topnav-link span { display: none; } }

  @media (max-width: 760px) {
    .topnav { padding: 14px 18px; }
    .topnav-logo span { display: none; }
    .topnav-links { gap: 2px; }
    .topnav-link { padding: 9px 9px; }
    main { padding: 32px 18px 70px; }
    .search-row { flex-direction: column; }
    .at-prefix { justify-content: center; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-logo" href="../home/">
    <img src="../imagens/logo.png" alt="Dazed Cegs" />
    <span>DAZED CEGs</span>
  </a>
  <div class="topnav-links">
    <a href="../home/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Home</span>
    </a>
    <a href="../cegs/" class="topnav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Área do Joiner</span>
    </a>
    <a href="../regras/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Regras Dazed CEGs</span>
    </a>
    <a href="../calculadora/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 11h.01M12 11h.01M16 11h.01"/></svg>
      <span>Calculadoras</span>
    </a>
    <a href="../pendentes/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h11"/></svg>
      <span>Pendências</span>
    </a>
    <a href="../sobras/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.6 6.6L22 9.3l-5.5 4.6L18.2 21 12 17.3 5.8 21l1.7-7.1L2 9.3l7.4-.7z"/></svg>
      <span>Sobras</span>
    </a>
  </div>
  <div class="topnav-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
  </div>
</nav>

<main>

  <div class="page-header">
    <div class="page-header-text">
      <div class="eyebrow">Área do Joiner</div>
      <h1>Consulta de itens</h1>
      <p>Consulte seus itens, acompanhe os status e visualize seus pagamentos em um só lugar.</p>
    </div>
    <button type="button" class="btn btn-primary download-btn-top" id="downloadPdfBtn" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Exportar PDF
    </button>
  </div>

  <div class="search-card">
    <div class="search-row">
      <div class="at-prefix">@</div>
      <input
        type="text"
        id="handleInput"
        placeholder="Buscar por usuário..."
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button id="searchBtn">Buscar</button>
    </div>
    <div class="filter-row" id="filterRow" style="display:none;">
      <select id="cegFilter">
        <option value="">Todas as CEGs</option>
      </select>
      <select id="statusFilter">
        <option value="">Todos os status</option>
      </select>
      <select id="pobFilter">
        <option value="">Todos os itens</option>
      </select>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="stat-grid" id="statGrid" style="display:none;">
    <div class="stat-card is-itens">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
      </div>
      <div>
        <div class="stat-card-value" id="totalItensCount">0</div>
        <div class="stat-card-label">Itens</div>
      </div>
    </div>
    <div class="stat-card is-pago">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 12.5l2 2 4-4.5"/></svg>
      </div>
      <div>
        <div class="stat-card-value" id="totalPago">R$ 0</div>
        <div class="stat-card-label">Pago</div>
      </div>
    </div>
    <div class="stat-card is-pendente">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div>
        <div class="stat-card-value" id="totalPendente">R$ 0</div>
        <div class="stat-card-label">Pendente</div>
      </div>
    </div>
    <div class="stat-card is-total">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.6 6.6L22 9.3l-5.5 4.6L18.2 21 12 17.3 5.8 21l1.7-7.1L2 9.3l7.4-.7z"/></svg>
      </div>
      <div>
        <div class="stat-card-value" id="totalGeral">R$ 0</div>
        <div class="stat-card-label">Total geral</div>
      </div>
    </div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none;">
    <div class="results-summary" id="resultsSummary"></div>
    <div class="view-toggle" id="viewToggle">
      <button type="button" class="view-btn" id="viewListBtn" data-view="list">Lista</button>
      <button type="button" class="view-btn active" id="viewGridBtn" data-view="grid">Grid</button>
      <button type="button" class="view-btn" id="viewTableBtn" data-view="table">Tabela</button>
    </div>
  </div>

  <div class="results view-grid" id="results"></div>

  <div class="pagination" id="pagination" style="display:none;"></div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycby51xkp8ka5boynUNZoXn4yktt-C_LzNRwD5dam6YeY4f6zEPsNJGlOyDuk4rDdUMtS7g/exec';
  const IMG_FOLDER = '../imagens/';
  const PAGE_SIZE = 12;

  const input = document.getElementById('handleInput');
  const btn = document.getElementById('searchBtn');
  const statusMsg = document.getElementById('statusMsg');
  const resultsEl = document.getElementById('results');
  const statusFilter = document.getElementById('statusFilter');
  const pobFilter = document.getElementById('pobFilter');
  const cegFilter = document.getElementById('cegFilter');
  const filterRow = document.getElementById('filterRow');
  const toolbar = document.getElementById('toolbar');
  const resultsSummary = document.getElementById('resultsSummary');
  const paginationEl = document.getElementById('pagination');

  let allPedidos = [];
  let cegsConfig = [];
  let currentView = 'grid';
  let lastRendered = [];
  let lastTotal = 0;
  let currentHandle = '';
  let currentPage = 1;

  const statGrid = document.getElementById('statGrid');
  const downloadPdfBtn = document.getElementById('downloadPdfBtn');
  const totalItensCount = document.getElementById('totalItensCount');
  const totalPago = document.getElementById('totalPago');
  const totalPendente = document.getElementById('totalPendente');
  const totalGeral = document.getElementById('totalGeral');
  const viewButtons = [
    document.getElementById('viewListBtn'),
    document.getElementById('viewGridBtn'),
    document.getElementById('viewTableBtn')
  ];

  function statusClass(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('finalizado') || s.includes('enviado joiner')) return 'status-finalizado';
    if (s.includes('warehouse') || s.includes('gom') || s.includes('seller')) return 'status-warehouse';
    if (s.includes('enviado') || s.includes('alfandega') || s.includes('alfândega') || s.includes('transito')) return 'status-transito';
    if (s.includes('comprado') || s.includes('aguardando')) return 'status-pendente';
    return 'status-transito';
  }

  function renderSkeleton() {
    resultsEl.className = 'results view-grid';
    resultsEl.innerHTML = '';
    filterRow.style.display = 'none';
    toolbar.style.display = 'none';
    statGrid.style.display = 'none';
    downloadPdfBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    for (let i = 0; i < 8; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      resultsEl.appendChild(sk);
    }
  }

  function renderError(msg) {
    resultsEl.className = 'results view-grid';
    resultsEl.innerHTML = '';
    filterRow.style.display = 'none';
    toolbar.style.display = 'none';
    statGrid.style.display = 'none';
    downloadPdfBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    statusMsg.textContent = msg;
    statusMsg.classList.add('error');
  }

  function escapeAttr(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function populateFilters(pedidos) {
    const cegs = [...new Set(pedidos.map(p => (p.ceg || '').trim()).filter(Boolean))].sort();
    cegFilter.innerHTML = '<option value="">Todas as CEGs</option>' +
      cegs.map(c => `<option value="${escapeAttr(c)}">${c}</option>`).join('');
    updateDependentFilters();
  }

  function cegShowsPobFilter(cegNome) {
    if (!cegNome) return true;
    const cfg = cegsConfig.find(c => c.nome === cegNome);
    return cfg ? !!cfg.showPobFilter : true;
  }

  function updateDependentFilters() {
    const cegVal = cegFilter.value;
    const scoped = cegVal ? allPedidos.filter(p => (p.ceg || '').trim() === cegVal) : allPedidos;

    const statuses = [...new Set(scoped.map(p => (p.status || '').trim()).filter(Boolean))].sort();
    statusFilter.innerHTML = '<option value="">Todos os status</option>' +
      statuses.map(s => `<option value="${escapeAttr(s)}">${s}</option>`).join('');

    const showPob = cegVal
      ? cegShowsPobFilter(cegVal)
      : cegsConfig.some(c => c.showPobFilter);

    if (showPob) {
      const pobs = [...new Set(scoped.map(p => (p.pob || '').trim()).filter(Boolean))].sort();
      pobFilter.innerHTML = '<option value="">Todos os itens</option>' +
        pobs.map(p => `<option value="${escapeAttr(p)}">${p}</option>`).join('');
      pobFilter.style.display = '';
    } else {
      pobFilter.value = '';
      pobFilter.style.display = 'none';
    }
  }

  function applyFilters() {
    const cegVal = cegFilter.value;
    const statusVal = statusFilter.value;
    const pobVal = cegShowsPobFilter(cegVal) ? pobFilter.value : '';
    const filtered = allPedidos.filter(p =>
      (!cegVal || (p.ceg || '').trim() === cegVal) &&
      (!statusVal || (p.status || '').trim() === statusVal) &&
      (!pobVal || (p.pob || '').trim() === pobVal)
    );
    currentPage = 1;
    renderCards(filtered, allPedidos.length);
  }

  function updateStatGrid(pedidos) {
    if (!pedidos || pedidos.length === 0) {
      statGrid.style.display = 'none';
      return;
    }

    let totalPagoVal = 0;
    let totalPendenteVal = 0;

    pedidos.forEach(p => {
      const valor = typeof p.valor === 'number' ? p.valor : 0;
      if (p.pagamento === 'Pago') {
        totalPagoVal += valor;
      } else {
        totalPendenteVal += valor + (p.multa || 0);
      }
    });

    const totalGeralVal = totalPagoVal + totalPendenteVal;

    totalItensCount.textContent = pedidos.length;
    totalPago.textContent = formatMoney(totalPagoVal);
    totalPendente.textContent = formatMoney(totalPendenteVal);
    totalGeral.textContent = formatMoney(totalGeralVal);
    statGrid.style.display = 'grid';
  }

  function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / PAGE_SIZE);
    paginationEl.innerHTML = '';

    if (totalPages <= 1) {
      paginationEl.style.display = 'none';
      return;
    }
    paginationEl.style.display = 'flex';

    function makeBtn(label, page, opts = {}) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'page-btn' + (opts.active ? ' active' : '');
      b.textContent = label;
      b.disabled = !!opts.disabled;
      b.addEventListener('click', () => {
        currentPage = page;
        renderCards(lastRendered, lastTotal, true);
        window.scrollTo({ top: toolbar.offsetTop - 90, behavior: 'smooth' });
      });
      return b;
    }

    paginationEl.appendChild(makeBtn('«', currentPage - 1, { disabled: currentPage === 1 }));

    const pages = [];
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) pages.push(i);
    }
    let prev = 0;
    pages.forEach(p => {
      if (prev && p - prev > 1) {
        const dots = document.createElement('span');
        dots.className = 'page-ellipsis';
        dots.textContent = '…';
        paginationEl.appendChild(dots);
      }
      paginationEl.appendChild(makeBtn(String(p), p, { active: p === currentPage }));
      prev = p;
    });

    paginationEl.appendChild(makeBtn('»', currentPage + 1, { disabled: currentPage === totalPages }));
  }

  function renderCards(pedidos, totalOriginal, skipReset) {
    lastRendered = pedidos;
    lastTotal = totalOriginal;
    if (!skipReset) currentPage = 1;

    updateStatGrid(pedidos);

    if (!pedidos || pedidos.length === 0) {
      resultsEl.className = 'results view-grid';
      resultsEl.innerHTML = `<div class="empty-state">Nenhum item encontrado com esse filtro.</div>`;
      toolbar.style.display = 'none';
      paginationEl.style.display = 'none';
      downloadPdfBtn.style.display = 'none';
      return;
    }

    toolbar.style.display = 'flex';
    downloadPdfBtn.style.display = 'inline-flex';

    const filtered = pedidos.length !== totalOriginal;
    resultsSummary.textContent = pedidos.length + (pedidos.length === 1 ? ' item' : ' itens') + (filtered ? ` de ${totalOriginal}` : ' encontrados');

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = pedidos.slice(start, start + PAGE_SIZE);

    if (currentView === 'grid') renderGrid(pageItems);
    else if (currentView === 'table') renderTable(pageItems);
    else renderList(pageItems);

    renderPagination(pedidos.length);
  }

  function thumbHtml(p) {
    const slug = p.pobSlug || '';
    if (!slug) return '';
    const folder = p.imgFolder ? IMG_FOLDER + p.imgFolder + '/' : IMG_FOLDER;
    const imgSrc = folder + slug + '.png';
    return `<img src="${imgSrc}" alt="${p.pob || ''}" data-slug="${slug}" data-folder="${p.imgFolder || ''}" data-ext-idx="0" onerror="window.__tryNextExt(this)" />`;
  }

  function formatMoney(v) {
    return (typeof v === 'number')
      ? v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
      : (v || '-');
  }

  function formatValor(p) {
    return formatMoney(p && p.valor);
  }

  function renderGrid(pedidos) {
    resultsEl.className = 'results view-grid';
    resultsEl.innerHTML = '';
    pedidos.forEach(p => {
      const cls = statusClass(p.status);
      const totalItem = (typeof p.valor === 'number' ? p.valor : 0) + (p.multa || 0);
      const multaTexto = p.multa > 0
        ? `<div class="product-multa">+${formatMoney(p.multa)} multa</div>`
        : '';
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-photo">
          ${thumbHtml(p)}
          <span class="product-stamp ${cls}">${p.status || 'Sem status'}</span>
        </div>
        <div class="product-body">
          <p class="product-pob">${p.pob || 'Item'}</p>
          <div class="product-meta">${p.membro || '-'} &middot; ${p.ceg || '-'}</div>
          <div class="product-foot">
            <div>
              <div class="product-value">${formatValor(p)}</div>
              <div class="product-payment ${(p.pagamento || '').toLowerCase()}">${p.pagamento || ''}</div>
            </div>
          </div>
          ${multaTexto}
        </div>
      `;
      resultsEl.appendChild(card);
    });
  }

  function renderList(pedidos) {
    resultsEl.className = 'results view-list';
    resultsEl.innerHTML = '';
    pedidos.forEach(p => {
      const cls = statusClass(p.status);
      const card = document.createElement('div');
      card.className = 'order-card ' + cls;
      card.innerHTML = `
        <div class="order-thumb">${thumbHtml(p)}</div>
        <div class="order-main">
          <p class="order-pob">${p.pob || 'Item'}</p>
          <div class="order-meta">
            Membro: <span>${p.membro || '-'}</span><br>
            Prazo: <span>${p.prazo || '-'}</span>
          </div>
        </div>
        <div class="order-side">
          <div class="stamp ${cls}">${p.status || 'Sem status'}</div>
          <div class="order-value">${formatValor(p)}</div>
          <div class="order-payment ${(p.pagamento || '').toLowerCase()}">${p.pagamento || ''}</div>
        </div>
      `;
      resultsEl.appendChild(card);
    });
  }

  function renderTable(pedidos) {
    resultsEl.className = 'results view-table';
    resultsEl.innerHTML = '';
    const rows = pedidos.map(p => {
      const cls = statusClass(p.status);
      return `
        <tr>
          <td><div class="table-thumb">${thumbHtml(p)}</div></td>
          <td>${p.pob || 'Item'}</td>
          <td>${p.membro || '-'}</td>
          <td><span class="table-stamp ${cls}">${p.status || '-'}</span></td>
          <td>${formatValor(p)}</td>
          <td>${p.prazo || '-'}</td>
          <td>${p.pagamento || '-'}</td>
        </tr>`;
    }).join('');
    resultsEl.innerHTML = `
      <table class="order-table">
        <thead>
          <tr>
            <th></th>
            <th>Item</th>
            <th>Membro</th>
            <th>Status</th>
            <th>Valor</th>
            <th>Prazo</th>
            <th>Pagamento</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function setView(view) {
    currentView = view;
    viewButtons.forEach(b => b.classList.toggle('active', b.dataset.view === view));
    renderCards(lastRendered, lastTotal, true);
  }

  viewButtons.forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));

  function renderResults(data) {
    allPedidos = data.pedidos || [];
    cegsConfig = data.cegs || [];
    currentPage = 1;
    if (allPedidos.length === 0) {
      resultsEl.className = 'results view-grid';
      resultsEl.innerHTML = `
        <div class="empty-state">
          Nenhum item encontrado pra <strong>@${data.query}</strong>.<br>
          Confira se digitou certo ou fale com a gente.
        </div>`;
      cegFilter.innerHTML = '<option value="">Todas as CEGs</option>';
      statusFilter.innerHTML = '<option value="">Todos os status</option>';
      pobFilter.innerHTML = '<option value="">Todos os itens</option>';
      filterRow.style.display = 'none';
      toolbar.style.display = 'none';
      statGrid.style.display = 'none';
      downloadPdfBtn.style.display = 'none';
      paginationEl.style.display = 'none';
      return;
    }
    populateFilters(allPedidos);
    cegFilter.value = '';
    statusFilter.value = '';
    pobFilter.value = '';
    filterRow.style.display = 'flex';
    renderCards(allPedidos, allPedidos.length);
  }

  window.__tryNextExt = function(imgEl) {
    const exts = ['png', 'jpg', 'jpeg'];
    let idx = parseInt(imgEl.getAttribute('data-ext-idx') || '0', 10) + 1;
    const slug = imgEl.getAttribute('data-slug');
    const folderAttr = imgEl.getAttribute('data-folder') || '';
    const folder = folderAttr ? IMG_FOLDER + folderAttr + '/' : IMG_FOLDER;
    if (idx < exts.length) {
      imgEl.setAttribute('data-ext-idx', String(idx));
      imgEl.src = folder + slug + '.' + exts[idx];
    } else {
      const parent = imgEl.parentElement;
      imgEl.remove();
      if (parent) parent.style.background = 'rgba(111,112,161,0.08)';
    }
  };

  function downloadPdf() {
    if (!allPedidos || allPedidos.length === 0) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('Dazed Cegs - Itens de @' + currentHandle, 14, 18);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Gerado em ' + new Date().toLocaleDateString('pt-BR'), 14, 25);

    const rows = allPedidos.map(p => [
      p.ceg || '-',
      p.pob || '-',
      p.membro || '-',
      p.status || '-',
      formatValor(p),
      p.prazo || '-',
      p.pagamento || '-'
    ]);

    doc.autoTable({
      startY: 32,
      head: [['CEG', 'Item', 'Membro', 'Status', 'Valor', 'Prazo', 'Pagamento']],
      body: rows,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [111, 112, 161] },
      margin: { left: 14, right: 14 }
    });

    doc.save('dazed-cegs-' + currentHandle + '.pdf');
  }

  downloadPdfBtn.addEventListener('click', downloadPdf);

  async function search() {
    const handle = input.value.trim().replace(/^@/, '');
    if (!handle) {
      statusMsg.textContent = 'Digite seu user pra buscar.';
      statusMsg.classList.add('error');
      return;
    }

    currentHandle = handle;
    statusMsg.textContent = '';
    statusMsg.classList.remove('error');
    btn.disabled = true;
    renderSkeleton();

    try {
      const res = await fetch(`${API_URL}?at=${encodeURIComponent(handle)}`);
      if (!res.ok) throw new Error('Falha na consulta');
      const data = await res.json();
      if (data.error) {
        renderError(data.error);
      } else {
        renderResults(data);
      }
    } catch (err) {
      renderError('Não foi possível consultar agora. Tenta de novo em instantes.');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', search);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
  statusFilter.addEventListener('change', applyFilters);
  pobFilter.addEventListener('change', applyFilters);
  cegFilter.addEventListener('change', () => {
    updateDependentFilters();
    applyFilters();
  });
</script>

</body>
</html>
