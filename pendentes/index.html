<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazed Cegs - Valores Pendentes</title>
<link rel="icon" type="image/png" href="../imagens/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2B33;
    --ink-soft: #5C6270;
    --ink-faint: #8A90A0;
    --purple: #6F70A1;
    --purple-dark: #565780;
    --purple-tint: #F1F1F7;
    --coral: #FF5460;
    --coral-dark: #C23440;
    --green: #2A6B4C;
    --green-bg: #E1F0E8;
    --amber: #8A6418;
    --amber-bg: #FBEFD8;
    --card-bg: #ffffff;
    --line: rgba(43,43,51,0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: #FCFBF9;
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  a { text-decoration: none; color: inherit; }

  /* ---------- TOP NAV ---------- */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 44px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topnav-logo { display: flex; align-items: center; gap: 10px; }
  .topnav-logo img { height: 38px; width: 38px; border-radius: 9px; display: block; }
  .topnav-logo span {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--ink);
  }

  .topnav-links { display: flex; align-items: center; gap: 6px; }

  .topnav-link {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border-radius: 9px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .topnav-link svg { width: 16px; height: 16px; opacity: 0.75; }
  .topnav-link:hover { background: var(--purple-tint); color: var(--ink); }
  .topnav-link.active { color: var(--purple-dark); font-weight: 600; background: var(--purple-tint); }
  .topnav-link.active svg { opacity: 1; }

  @media (max-width: 1024px) { .topnav-link span { display: none; } }
  @media (max-width: 760px) {
    .topnav { padding: 14px 18px; }
    .topnav-logo span { display: none; }
    .topnav-links { gap: 2px; }
    .topnav-link { padding: 9px 9px; }
  }

  /* ---------- MAIN ---------- */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 24px 90px;
  }

  .page-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 32px;
    box-shadow: 0 1px 3px rgba(43,43,51,0.04);
  }

  /* ---------- HEADER ROW ---------- */
  .page-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .page-top-left { display: flex; align-items: flex-start; gap: 16px; }

  .page-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--purple-tint);
    color: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .page-icon svg { width: 22px; height: 22px; }

  .page-top h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .page-top p { font-size: 13.5px; color: var(--ink-soft); margin: 0; }

  .search-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .at-prefix {
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--purple);
    background: var(--purple-tint);
    border: 1px solid rgba(111,112,161,0.25);
    border-radius: 12px;
  }

  #handleInput {
    width: 200px;
    padding: 0 16px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    color: var(--ink);
    height: 44px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #handleInput:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(111,112,161,0.15);
  }

  #searchBtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 0 22px;
    height: 44px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  #searchBtn:hover {
    background: var(--purple-dark);
    transform: scale(1.04);
    box-shadow: 0 6px 18px rgba(111,112,161,0.38);
  }
  #searchBtn:active { transform: scale(0.97); }
  #searchBtn:disabled { opacity: 0.6; cursor: wait; transform: none; }

  .status-msg { margin-top: 12px; font-size: 13px; color: var(--ink-soft); }
  .status-msg.error { color: var(--coral-dark); }

  @media (max-width: 700px) {
    .page-top { flex-direction: column; }
    .search-row { width: 100%; }
    #handleInput { flex: 1; width: auto; }
  }

  /* ---------- STAT CARDS ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stat-card.is-highlight {
    background: var(--purple-tint);
    border-color: rgba(111,112,161,0.25);
  }

  .stat-icon {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: var(--purple-tint);
    color: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stat-card.is-multa .stat-icon { background: rgba(255,84,96,0.12); color: var(--coral-dark); }
  .stat-card.is-highlight .stat-icon { background: rgba(111,112,161,0.18); color: var(--purple-dark); }

  .stat-icon svg { width: 18px; height: 18px; }

  .stat-card-value {
    font-family: 'Oswald', sans-serif;
    font-size: 16.5px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }

  .stat-card.is-highlight .stat-card-value { color: var(--purple-dark); }

  .stat-card-label { font-size: 11.5px; color: var(--ink-faint); margin-top: 1px; }

  @media (max-width: 900px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ---------- ACTION BLOCKS ---------- */
  .action-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr 0.9fr;
    gap: 14px;
    margin-bottom: 30px;
  }

  @media (max-width: 900px) { .action-grid { grid-template-columns: 1fr; } }

  .action-card {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
  }

  .action-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }

  .action-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--green-bg);
    color: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .action-icon.is-purple { background: var(--purple-tint); color: var(--purple); }
  .action-icon svg { width: 17px; height: 17px; }

  .action-head h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    margin: 0 0 3px;
    color: var(--ink);
  }

  .action-head p { font-size: 12px; color: var(--ink-soft); margin: 0; line-height: 1.5; }

  .pix-key-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .pix-key-row input {
    flex: 1;
    height: 42px;
    padding: 0 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #FAFAFA;
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
  }

  .pix-copy-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  .pix-copy-icon:hover { background: var(--purple-tint); color: var(--purple-dark); }
  .pix-copy-icon svg { width: 16px; height: 16px; }

  .action-btn {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 16px;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .action-btn:active { transform: scale(0.97); }
  .action-btn svg { width: 14px; height: 14px; }

  .action-btn.is-filled {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
  }

  .action-btn.is-filled:hover {
    background: var(--purple-dark);
    transform: scale(1.03);
    box-shadow: 0 6px 18px rgba(111,112,161,0.38);
  }

  .action-card.is-info {
    background: var(--purple-tint);
    border-color: rgba(111,112,161,0.25);
  }

  .action-card.is-info p {
    font-size: 12.5px;
    color: var(--purple-dark);
    line-height: 1.6;
    margin: 0;
  }

  /* ---------- TABLE ---------- */
  .table-section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11.5px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 14px;
    font-weight: 600;
  }

  .table-wrap {
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow-x: auto;
    margin-bottom: 24px;
    -webkit-overflow-scrolling: touch;
  }

  table.pend-table { width: 100%; min-width: 820px; border-collapse: collapse; font-size: 12.5px; }

  table.pend-table th {
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: #FAFAFA;
    white-space: nowrap;
  }

  table.pend-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
    white-space: nowrap;
    color: var(--ink);
  }

  table.pend-table tr:last-child td { border-bottom: none; }
  table.pend-table .cell-dim { color: var(--ink-faint); }
  table.pend-table .cell-item { font-weight: 600; }

  .cell-multa {
    color: var(--coral-dark);
    font-weight: 600;
  }

  .cell-multa-days {
    display: block;
    font-size: 10.5px;
    color: var(--ink-faint);
    font-weight: 400;
  }

  .row-stamp {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
  }

  .row-stamp.is-pendente { color: var(--amber); background: var(--amber-bg); }
  .row-stamp.is-pago { color: var(--green); background: var(--green-bg); }

  /* ---------- BOTTOM ACTIONS ---------- */
  .bottom-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .btn-outline:hover { background: var(--purple-tint); transform: scale(1.03); }
  .btn-outline svg { width: 14px; height: 14px; }

  .btn-solid {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    background: var(--purple);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(111,112,161,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .btn-solid:hover {
    background: var(--purple-dark);
    transform: scale(1.03);
    box-shadow: 0 6px 18px rgba(111,112,161,0.38);
  }
  .btn-solid svg { width: 14px; height: 14px; }

  /* ---------- EMPTY / CLEAR STATE ---------- */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.6;
  }

  .clear-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--green-bg);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 8px;
  }

  .clear-banner-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(42,107,76,0.16);
    color: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .clear-banner-icon svg { width: 20px; height: 20px; }
  .clear-banner h3 { font-family: 'Oswald', sans-serif; font-size: 15px; margin: 0 0 2px; color: var(--green); }
  .clear-banner p { font-size: 12.5px; color: var(--ink-soft); margin: 0; }

  .skeleton {
    height: 56px;
    border-radius: 12px;
    background: #FAFAFA;
    border: 1px solid var(--line);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .skeleton::after {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(111,112,161,0.07), transparent);
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer { 100% { left: 100%; } }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-logo" href="../home/">
    <img src="../imagens/logo.png" alt="Dazed Cegs" />
    <span>DAZED CEGs</span>
  </a>
  <div class="topnav-links">
    <a href="../home/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Home</span>
    </a>
    <a href="../cegs/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Área do Joiner</span>
    </a>
    <a href="../regras/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Regras Dazed CEGs</span>
    </a>
    <a href="../calculadora/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 11h.01M12 11h.01M16 11h.01"/></svg>
      <span>Calculadoras</span>
    </a>
    <a href="../pendentes/" class="topnav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h11"/></svg>
      <span>Pendências</span>
    </a>
    <a href="../sobras/" class="topnav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.6 6.6L22 9.3l-5.5 4.6L18.2 21 12 17.3 5.8 21l1.7-7.1L2 9.3l7.4-.7z"/></svg>
      <span>Sobras</span>
    </a>
  </div>
</nav>

<main>
  <div class="page-card">

    <div class="page-top">
      <div class="page-top-left">
        <div class="page-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h11"/></svg>
        </div>
        <div>
          <h1>Valores pendentes</h1>
          <p>Consulte abaixo seus itens, fretes, taxas e multas em aberto.</p>
        </div>
      </div>
      <div class="search-row">
        <div class="at-prefix">@</div>
        <input
          type="text"
          id="handleInput"
          placeholder="seu_usuario"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="searchBtn">
          Buscar
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div id="resultsArea"></div>

  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycby51xkp8ka5boynUNZoXn4yktt-C_LzNRwD5dam6YeY4f6zEPsNJGlOyDuk4rDdUMtS7g/exec';
  const PIX_KEY = '5569aeb7-1863-498a-86e2-8941ec60471a';

  const input = document.getElementById('handleInput');
  const btn = document.getElementById('searchBtn');
  const statusMsg = document.getElementById('statusMsg');
  const resultsArea = document.getElementById('resultsArea');

  let currentHandle = '';
  let lastRows = [];

  function formatValor(v) {
    return (typeof v === 'number')
      ? v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
      : '-';
  }

  function encargoKind(tipo) {
    const t = (tipo || '').toLowerCase();
    if (t.includes('frete')) return 'frete';
    if (t.includes('tax')) return 'taxa';
    return 'outro';
  }

  function renderSkeleton() {
    resultsArea.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      resultsArea.appendChild(sk);
    }
  }

  function copyPix() {
    navigator.clipboard.writeText(PIX_KEY).then(() => {
      const btnEl = document.getElementById('pixCopyBtn');
      if (btnEl) {
        const original = btnEl.textContent;
        btnEl.textContent = 'Copiado!';
        setTimeout(() => { btnEl.textContent = original; }, 1800);
      }
    }).catch(() => {});
  }

  function buildActionBlocks() {
    return `
      <div class="action-grid">
        <div class="action-card">
          <div class="action-head">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h10v10H7z"/><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3z"/></svg>
            </div>
            <div>
              <h3>Pagamento via PIX</h3>
              <p>Chave PIX (e-mail)</p>
            </div>
          </div>
          <div class="pix-key-row">
            <input type="text" readonly value="${PIX_KEY}" />
            <button type="button" class="pix-copy-icon" onclick="copyPix()" aria-label="Copiar chave PIX">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>
          <button type="button" class="action-btn" id="pixCopyBtn" onclick="copyPix()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copiar chave PIX
          </button>
        </div>

        <div class="action-card">
          <div class="action-head">
            <div class="action-icon is-purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
            </div>
            <div>
              <h3>Enviar comprovante</h3>
              <p>Após realizar o pagamento, envie seu comprovante para que possamos confirmar.</p>
            </div>
          </div>
          <button type="button" class="action-btn is-filled">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
            Enviar comprovante
          </button>
        </div>

        <div class="action-card is-info">
          <div class="action-head" style="margin-bottom:0;">
            <div class="action-icon is-purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>
            </div>
            <div>
              <h3 style="color:var(--purple-dark);">Seus dados estão seguros</h3>
              <p>Usamos o Google Forms para receber e proteger seu comprovante.</p>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderResults(data) {
    resultsArea.innerHTML = '';

    const semItens = (data.total || 0) === 0;
    const semEncargos = !data.encargos || data.encargos.length === 0;

    if (semItens && semEncargos) {
      resultsArea.innerHTML = `<div class="empty-state">Nenhum cadastro encontrado pra <strong>@${data.query}</strong>.</div>`;
      return;
    }

    const itensPendentes = (data.pedidos || []).filter(p => p.pagamento === 'Pendente');
    const encargosPendentes = (data.encargos || []).filter(e => e.pagamento === 'Pendente');
    const fretePendente = encargosPendentes.filter(e => encargoKind(e.tipo) === 'frete');
    const taxaPendente = encargosPendentes.filter(e => encargoKind(e.tipo) === 'taxa');

    const sumValor = arr => arr.reduce((s, x) => s + (typeof x.valor === 'number' ? x.valor : 0), 0);
    const sumMulta = arr => arr.reduce((s, x) => s + (x.multa || 0), 0);

    const totalItensVal = sumValor(itensPendentes);
    const totalFreteVal = sumValor(fretePendente);
    const totalTaxaVal = sumValor(taxaPendente);
    const totalMultaVal = sumMulta(itensPendentes) + sumMulta(encargosPendentes);
    const totalGeralVal = totalItensVal + totalFreteVal + totalTaxaVal + totalMultaVal;

    const temPendencia = itensPendentes.length > 0 || encargosPendentes.length > 0;

    if (!temPendencia) {
      resultsArea.innerHTML = `
        <div class="clear-banner">
          <div class="clear-banner-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
          <div>
            <h3>Tudo certo por aqui!</h3>
            <p>Nenhuma pendência em aberto pra @${data.query}.</p>
          </div>
        </div>
      `;
      lastRows = [];
      return;
    }

    let html = `
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg></div>
          <div><div class="stat-card-value">${formatValor(totalItensVal)}</div><div class="stat-card-label">Itens</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="7" width="15" height="10" rx="1"/><path d="M16 10h3l3 3v4h-6z"/><circle cx="6" cy="19" r="1.6"/><circle cx="17" cy="19" r="1.6"/></svg></div>
          <div><div class="stat-card-value">${formatValor(totalFreteVal)}</div><div class="stat-card-label">Frete</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6M9 16h6M9 8h6"/><rect x="5" y="3" width="14" height="18" rx="1.5"/></svg></div>
          <div><div class="stat-card-value">${formatValor(totalTaxaVal)}</div><div class="stat-card-label">Taxas</div></div>
        </div>
        <div class="stat-card is-multa">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/></svg></div>
          <div><div class="stat-card-value">${formatValor(totalMultaVal)}</div><div class="stat-card-label">Multas</div></div>
        </div>
        <div class="stat-card is-highlight">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg></div>
          <div><div class="stat-card-value">${formatValor(totalGeralVal)}</div><div class="stat-card-label">Total pendente</div></div>
        </div>
      </div>

      ${buildActionBlocks()}

      <p class="table-section-label">Detalhamento</p>
      <div class="table-wrap">
        <table class="pend-table">
          <thead>
            <tr>
              <th>CEG</th>
              <th>Item</th>
              <th>Valor Item</th>
              <th>Multa Item</th>
              <th>Frete</th>
              <th>Multa Frete</th>
              <th>Taxa</th>
              <th>Multa Taxa</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
    `;

    const rows = [];

    itensPendentes.forEach(p => {
      const total = (typeof p.valor === 'number' ? p.valor : 0) + (p.multa || 0);
      rows.push({
        ceg: p.ceg || '-', item: p.pob || 'Item', membro: p.membro || '-',
        valorItem: p.valor, multaItem: p.multa, frete: null, multaFrete: null,
        taxa: null, multaTaxa: null, total, diasAtraso: p.diasAtraso, status: p.pagamento
      });
    });

    fretePendente.forEach(e => {
      const total = (typeof e.valor === 'number' ? e.valor : 0) + (e.multa || 0);
      rows.push({
        ceg: e.origem || '-', item: e.tipo || 'Frete', membro: '-',
        valorItem: null, multaItem: null, frete: e.valor, multaFrete: e.multa,
        taxa: null, multaTaxa: null, total, diasAtraso: e.diasAtraso, status: e.pagamento
      });
    });

    taxaPendente.forEach(e => {
      const total = (typeof e.valor === 'number' ? e.valor : 0) + (e.multa || 0);
      rows.push({
        ceg: e.origem || '-', item: e.tipo || 'Taxa', membro: '-',
        valorItem: null, multaItem: null, frete: null, multaFrete: null,
        taxa: e.valor, multaTaxa: e.multa, total, diasAtraso: e.diasAtraso, status: e.pagamento
      });
    });

    lastRows = rows;

    function cellMulta(v, dias) {
      if (!v) return '<span class="cell-dim">-</span>';
      const diasTxt = dias ? `<span class="cell-multa-days">${dias} ${dias === 1 ? 'dia' : 'dias'}</span>` : '';
      return `<span class="cell-multa">${formatValor(v)}</span>${diasTxt}`;
    }

    rows.forEach(r => {
      const statusLabel = r.status === 'Pago' ? 'Pago' : 'Aguardando pagamento';
      const statusCls = r.status === 'Pago' ? 'is-pago' : 'is-pendente';
      html += `
        <tr>
          <td class="cell-dim">${r.ceg}</td>
          <td class="cell-item">${r.item}</td>
          <td>${r.valorItem != null ? formatValor(r.valorItem) : '<span class="cell-dim">-</span>'}</td>
          <td>${cellMulta(r.multaItem, r.diasAtraso)}</td>
          <td>${r.frete != null ? formatValor(r.frete) : '<span class="cell-dim">-</span>'}</td>
          <td>${cellMulta(r.multaFrete, r.diasAtraso)}</td>
          <td>${r.taxa != null ? formatValor(r.taxa) : '<span class="cell-dim">-</span>'}</td>
          <td>${cellMulta(r.multaTaxa, r.diasAtraso)}</td>
          <td><strong>${formatValor(r.total)}</strong></td>
          <td><span class="row-stamp ${statusCls}">${statusLabel}</span></td>
        </tr>
      `;
    });

    html += `
          </tbody>
        </table>
      </div>

      <div class="bottom-actions">
        <button type="button" class="btn-outline" id="downloadPdfBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Baixar cobrança em PDF
        </button>
        <button type="button" class="btn-solid" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.5-3.5L23 10M1 14l5 4.5A9 9 0 0020.5 15"/></svg>
          Atualizar valores
        </button>
      </div>
    `;

    resultsArea.innerHTML = html;

    document.getElementById('downloadPdfBtn').addEventListener('click', downloadPdf);
    document.getElementById('refreshBtn').addEventListener('click', search);
  }

  function downloadPdf() {
    if (!lastRows || lastRows.length === 0) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('Dazed Cegs - Cobrança de @' + currentHandle, 14, 18);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Gerado em ' + new Date().toLocaleDateString('pt-BR'), 14, 25);

    const body = lastRows.map(r => [
      r.ceg, r.item,
      r.valorItem != null ? formatValor(r.valorItem) : '-',
      r.multaItem ? formatValor(r.multaItem) : '-',
      r.frete != null ? formatValor(r.frete) : '-',
      r.multaFrete ? formatValor(r.multaFrete) : '-',
      r.taxa != null ? formatValor(r.taxa) : '-',
      r.multaTaxa ? formatValor(r.multaTaxa) : '-',
      formatValor(r.total),
      r.status === 'Pago' ? 'Pago' : 'Aguardando pagamento'
    ]);

    doc.autoTable({
      startY: 32,
      head: [['CEG', 'Item', 'Vlr Item', 'Multa Item', 'Frete', 'Multa Frete', 'Taxa', 'Multa Taxa', 'Total', 'Status']],
      body,
      styles: { fontSize: 7, cellPadding: 2 },
      headStyles: { fillColor: [111, 112, 161] },
      margin: { left: 10, right: 10 }
    });

    doc.save('dazed-cegs-pendencias-' + currentHandle + '.pdf');
  }

  async function search() {
    const handle = input.value.trim().replace(/^@/, '');
    if (!handle) {
      statusMsg.textContent = 'Digite seu user pra buscar.';
      statusMsg.classList.add('error');
      return;
    }

    currentHandle = handle;
    statusMsg.textContent = '';
    statusMsg.classList.remove('error');
    btn.disabled = true;
    renderSkeleton();

    try {
      const res = await fetch(`${API_URL}?at=${encodeURIComponent(handle)}`);
      if (!res.ok) throw new Error('Falha na consulta');
      const data = await res.json();
      if (data.error) {
        resultsArea.innerHTML = '';
        statusMsg.textContent = data.error;
        statusMsg.classList.add('error');
      } else {
        renderResults(data);
      }
    } catch (err) {
      resultsArea.innerHTML = '';
      statusMsg.textContent = 'Não foi possível consultar agora. Tenta de novo em instantes.';
      statusMsg.classList.add('error');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', search);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>

</body>
</html>
