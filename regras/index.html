<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazed Cegs - Regras Dazed CEGs</title>
<link rel="icon" type="image/png" href="../imagens/logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2B33;
    --ink-soft: #5C6270;
    --ink-faint: #8A90A0;
    --purple: #6F70A1;
    --purple-dark: #565780;
    --purple-tint: #F1F1F7;
    --coral: #FF5460;
    --coral-dark: #C23440;
    --line: rgba(43,43,51,0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: #FCFBF9;
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
  }

  a { text-decoration: none; color: inherit; }

  /* ───── NAVBAR ───── */
  .nav{
    position:sticky;top:0;z-index:30;
    background:#fff;
    border-bottom:1px solid #E5E7EB;
    display:flex;align-items:center;
    padding:0 32px;height:64px;
    gap:0;
  }
  .nav-logo{
    position:absolute;left:32px;
    display:flex;align-items:center;
    line-height:1;
  }
  .nav-logo img{height:52px;width:auto;display:block;}

  .nav-links{
    margin:0 auto;
    display:flex;align-items:stretch;gap:0;
  }
  .nav-a{
    display:flex;align-items:center;gap:6px;
    padding:0 18px;height:64px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;font-weight:500;color:#4A5070;
    border-bottom:2.5px solid transparent;
    transition:color .15s,border-color .15s;
    white-space:nowrap;position:relative;
  }
  .nav-a svg{width:16px;height:16px;stroke:#4A5070;fill:none;flex-shrink:0;}
  .nav-a:hover{color:#1F2340;}
  .nav-a.active{color:#1F2340;font-weight:600;border-bottom-color:#4B5BAD;}
  .nav-a.active svg{stroke:#1F2340;}
  @media(max-width:1080px){.nav-a span{display:none;}}
  @media(max-width:680px){.nav{padding:0 16px;}.nav-logo{left:16px;}.nav-a{padding:0 10px;}}

  /* ---------- MAIN ---------- */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 100px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--purple-dark);
    margin-bottom: 24px;
  }

  .back-link svg { width: 14px; height: 14px; }
  .back-link:hover { color: var(--coral-dark); }

  .page-header { margin-bottom: 32px; }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Oswald', sans-serif;
    font-size: 11.5px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: var(--purple);
    background: var(--purple-tint);
    padding: 7px 16px;
    border-radius: 999px;
    margin-bottom: 18px;
    font-weight: 600;
  }

  .page-header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    margin: 0;
    color: var(--ink);
  }

  /* ---------- PLACEHOLDER ---------- */
  .placeholder-card {
    background: #fff;
    border: 1px dashed rgba(111,112,161,0.35);
    border-radius: 20px;
    padding: 60px 32px;
    text-align: center;
  }

  .placeholder-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--purple-tint);
    color: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .placeholder-icon svg { width: 26px; height: 26px; }

  .placeholder-card h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 10px;
    color: var(--ink);
  }

  .placeholder-card p {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.7;
    max-width: 380px;
    margin: 0 auto;
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="../home/">
    <img src="../imagens/logo.png" alt="DAZED CEGs">
  </a>
  <div class="nav-links">
    <a class="nav-a" href="../home/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-a" href="../cegs/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>Área do Joiner</span>
    </a>
    <a class="nav-a active" href="../regras/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span>Regras DAZED CEGs</span>
    </a>
    <a class="nav-a" href="../calculadora/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Calculadoras</span>
    </a>
    <a class="nav-a" href="../pendentes/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>
      <span>Pendências</span>
    </a>
    <a class="nav-a" href="../sobras/">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M20 12v10H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
      <span>Sobras</span>
    </a>
  </div>
</nav>

<main>

  <a class="back-link" href="../home/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar para a Home
  </a>

  <div class="page-header">
    <div class="eyebrow">Guia DAZED</div>
    <h1>Regras Dazed CEGs</h1>
  </div>

  <div class="placeholder-card">
    <div class="placeholder-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </div>
    <h2>Conteúdo em breve</h2>
    <p>Estamos preparando as regras completas da Dazed CEGs — prazos, pagamentos, multas e tudo o que você precisa saber. Volte em breve!</p>
  </div>

</main>

</body>
</html>
